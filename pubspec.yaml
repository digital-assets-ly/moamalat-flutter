name: digital_assets_moamalat_pay
description: >-
  Unofficial Flutter helper around the Moamalat payment gateway, built by
  Digital Assets. Not affiliated with or endorsed by Moamalat. Wraps the
  legacy PayLink REST endpoints (PayByCard, CheckTxnStatus) and ships an
  optional Material card-payment widget with built-in 3DS / OTP handling.
version: 0.1.0
homepage: https://github.com/digital-assets/moamalat-flutter
repository: https://github.com/digital-assets/moamalat-flutter
issue_tracker: https://github.com/digital-assets/moamalat-flutter/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  dio: ^5.9.2
  intl: ^0.20.2
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Pure Dart + Flutter package (no platform channels / no `flutter:` plugin block).
# Targets iOS and Android only; web and desktop are unsupported because the
# embedded 3DS WebView relies on `webview_flutter`'s mobile platform views.
